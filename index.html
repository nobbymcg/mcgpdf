<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>McGPDF Lightweight PDF Reader</title>

<style>
  html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
  }

  body {
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* Custom title bar (window chrome is hidden in main.js; native min/max/close
     buttons are still drawn on top via titleBarOverlay). */
  #titlebar {
    height: 32px;
    flex: 0 0 auto;
    background: #f0f0f0;
    color: #222;
    display: flex;
    align-items: center;
    font-size: 13px;
    -webkit-app-region: drag;
    user-select: none;
    /* Reserve room on the right for the native window controls overlay. */
    padding: 0 140px 0 8px;
    box-sizing: border-box;
    gap: 8px;
  }

  #titlebar-icon {
    width: 18px;
    height: 18px;
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #titlebar-icon svg,
  #titlebar-icon img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
  }

  #titlebar-text {
    flex: 1 1 auto;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: center;
    /* Counter the 18px icon + 8px gap on the left so the title stays
       optically centered relative to the full window width. */
    padding-right: 26px;
  }

  /* Dark theme — toggled by adding 'dark' class to <body>. */
  body.dark #titlebar { background: #202020; color: #f0f0f0; }
  body.dark #toolbar  { background: #2b2b2b; color: #f0f0f0; }
  body.dark #toolbar button,
  body.dark #toolbar input[type="text"] {
    background: #3a3a3a;
    color: #f0f0f0;
    border: 1px solid #555;
  }
  body.dark #toolbar input[type="text"]::placeholder { color: #aaa; }
  body.dark #version-info { color: #bbb; }
  body.dark #open-btn .btn-icon { filter: invert(1); }
  body.dark #save-btn .btn-icon { filter: invert(1); }
  body.dark .nav-btn .btn-icon { filter: invert(1); }

  #open-btn,
  #save-btn { display: inline-flex; align-items: center; justify-content: center; padding: 4px 8px; }
  #open-btn .btn-icon,
  #save-btn .btn-icon { width: 18px; height: 18px; display: block; }
  .nav-btn { display: inline-flex; align-items: center; justify-content: center; padding: 4px 8px; min-width: 28px; height: 28px; box-sizing: border-box; }
  .nav-btn .btn-icon { width: 18px; height: 18px; display: block; }
  #search-box { height: 28px; box-sizing: border-box; padding: 0 8px; }
  #find-next-btn { height: 28px; box-sizing: border-box; padding: 0 10px; display: inline-flex; align-items: center; justify-content: center; }

  #toolbar {
    padding: 10px;
    background: #f0f0f0;
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 0 0 auto;
    /* Toolbar must not be a drag region or its controls are inert. */
    -webkit-app-region: no-drag;
  }

  #version-info {
    margin-left: auto;
    color: #555;
    font-size: 12px;
    font-family: Arial, sans-serif;
  }

  #viewer {
    position: relative;
    /* Scroll area for continuous paging. Fills remaining viewport height. */
    flex: 1 1 auto;
    min-height: 0;
    overflow: auto;
    background: #525659;
    padding: 10px 0;
  }

  .page {
    position: relative;
    margin: 10px auto;
    background: white;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
  }

  canvas {
    display: block;
  }

  .textLayer {
    position: absolute;
    left: 0;
    top: 0;
    opacity: 0.25;
    line-height: 1.0;
    pointer-events: none;
    z-index: 1;
  }

  .textLayer > span {
    color: transparent;
    position: absolute;
    white-space: pre;
    cursor: text;
    transform-origin: 0% 0%;
  }

  .textLayer .highlight {
    background-color: yellow;
    border-radius: 2px;
  }

  /* Link layer: clickable rectangles overlaid on top of the page. */
  .linkLayer {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 2;
    pointer-events: none;
  }

  .linkLayer a {
    position: absolute;
    display: block;
    pointer-events: auto;
    cursor: pointer;
    background: rgba(255, 255, 0, 0.05);
    text-decoration: none;
  }

  .linkLayer a:hover {
    background: rgba(255, 255, 0, 0.25);
    outline: 1px solid rgba(255, 200, 0, 0.7);
  }
</style>
</head>

<body>

<div id="titlebar">
  <div id="titlebar-icon" aria-hidden="true">
    <img src="scotty.ico" alt="">
  </div>
  <span id="titlebar-text">McGPDF</span>
</div>

<div id="toolbar">
  <input type="file" id="file-input" accept="application/pdf" hidden>
  <button type="button" id="open-btn" title="Open PDF" aria-label="Open PDF" onclick="document.getElementById('file-input').click()"><img src="open.svg" alt="" class="btn-icon"></button>
  <button type="button" id="save-btn" title="Save PDF as..." aria-label="Save PDF as" onclick="saveCurrent()"><img src="save.svg" alt="" class="btn-icon"></button>
  <button type="button" class="nav-btn" title="Previous page" aria-label="Previous page" onclick="prevPage()"><img src="prev.svg" alt="" class="btn-icon"></button>
  <button type="button" class="nav-btn" title="Next page" aria-label="Next page" onclick="nextPage()"><img src="next.svg" alt="" class="btn-icon"></button>
  <button type="button" class="nav-btn" title="Zoom in" aria-label="Zoom in" onclick="zoomIn()"><img src="zoom-plus.svg" alt="" class="btn-icon"></button>
  <button type="button" class="nav-btn" title="Zoom out" aria-label="Zoom out" onclick="zoomOut()"><img src="zoom-minus.svg" alt="" class="btn-icon"></button>
  <input type="text" id="search-box" placeholder="Search...">
  <button type="button" id="find-next-btn" onclick="searchText()">Find Next</button>
  <span id="page-info"></span>
  <span id="version-info"></span>
</div>

<div id="viewer"></div>

<script src="vendor/pdfjs/pdf.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'vendor/pdfjs/pdf.worker.min.js';

let pdfDoc = null;
let currentPage = 1;
let scale = 1.5;
let searchTerm = "";
let searchStartPage = 1;

// Per-page state: { pageDiv, canvas, textLayerDiv, linkLayerDiv,
//                   rendered, rendering }
let pageStates = [];
let pageObserver = null;

const viewer = document.getElementById('viewer');

// Apply OS theme (dark/light) by toggling a class on <body>.
function applyTheme(dark) {
  document.body.classList.toggle('dark', !!dark);
}
if (window.mcgpdf) {
  applyTheme(window.mcgpdf.initialTheme === 'dark');
  if (typeof window.mcgpdf.onThemeChanged === 'function') {
    window.mcgpdf.onThemeChanged(({ dark }) => applyTheme(dark));
  }
}

// Update the centered filename in the custom title bar.
function setDocumentName(name) {
  const text = name || 'McGPDF';
  document.getElementById('titlebar-text').textContent = text;
  document.title = name ? name + ' \u2014 McGPDF' : 'McGPDF';
}

// Show app version at the right of the toolbar.
if (window.mcgpdf && window.mcgpdf.appVersion) {
  document.getElementById('version-info').textContent =
    'v' + window.mcgpdf.appVersion;
}

// Resolve a PDF "destination" (named string or explicit array) to a 1-based
// page number in the current document.
async function resolveDestinationToPage(dest) {
  if (!pdfDoc || dest == null) return null;
  let explicit = dest;
  if (typeof dest === 'string') {
    try {
      explicit = await pdfDoc.getDestination(dest);
    } catch {
      return null;
    }
  }
  if (!Array.isArray(explicit)) return null;
  const ref = explicit[0];
  try {
    const pageIndex = await pdfDoc.getPageIndex(ref);
    return pageIndex + 1;
  } catch {
    return null;
  }
}

document.getElementById('file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  setDocumentName(file.name);
  currentPdfName = file.name;

  const fileReader = new FileReader();

  fileReader.onload = function() {
    loadPdfBytes(new Uint8Array(this.result));
  };

  fileReader.readAsArrayBuffer(file);
});

// Track the currently loaded PDF so we can offer Save As.
let currentPdfBytes = null;
let currentPdfName = null;

// Load PDF bytes (Uint8Array) into the viewer. Shared by the file-input path
// and the Electron "open with" IPC path.
function loadPdfBytes(typedarray) {
  // pdf.js detaches the underlying ArrayBuffer when it consumes the bytes,
  // so keep an independent copy for Save As.
  currentPdfBytes = new Uint8Array(typedarray);
  pdfjsLib.getDocument(typedarray).promise.then(pdf => {
    pdfDoc = pdf;
    currentPage = 1;
    searchTerm = "";
    buildAllPages();
  }).catch(err => alert("Failed to open PDF: " + err.message));
}

// Save the currently loaded PDF to a user-chosen location. In Electron we
// route through the main process so we can use the native save dialog and
// write to disk; in a plain browser we fall back to a Blob download.
async function saveCurrent() {
  if (!currentPdfBytes) {
    alert("No PDF is open.");
    return;
  }
  const suggested = currentPdfName || "document.pdf";
  if (window.mcgpdf && typeof window.mcgpdf.savePdf === 'function') {
    try {
      const res = await window.mcgpdf.savePdf(
        currentPdfBytes.buffer.slice(
          currentPdfBytes.byteOffset,
          currentPdfBytes.byteOffset + currentPdfBytes.byteLength
        ),
        suggested
      );
      if (res && res.error) {
        alert("Failed to save PDF: " + res.error);
      }
    } catch (err) {
      alert("Failed to save PDF: " + (err && err.message || err));
    }
    return;
  }
  // Browser fallback.
  const blob = new Blob([currentPdfBytes], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = suggested;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// When running under Electron, the preload script exposes window.mcgpdf and
// pushes the file bytes when the user opens a PDF via Explorer / Open With.
if (window.mcgpdf && typeof window.mcgpdf.onOpenPdf === 'function') {
  window.mcgpdf.onOpenPdf((bytes, name) => {
    if (name) { setDocumentName(name); currentPdfName = name; }
    loadPdfBytes(new Uint8Array(bytes));
  });
  if (typeof window.mcgpdf.onError === 'function') {
    window.mcgpdf.onError(({ path, message }) => {
      alert("Failed to open " + path + ":\n" + message);
    });
  }
}

document.getElementById('search-box').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchText();
});

// Track current page as the user scrolls.
viewer.addEventListener('scroll', () => {
  if (!pdfDoc) return;
  const viewerTop = viewer.scrollTop;
  // The "current" page is the one whose top is nearest to (but not past) the
  // top of the viewport, with a small bias so a page is considered current
  // once roughly a third of it is visible.
  const bias = viewer.clientHeight * 0.33;
  let best = 1;
  for (let i = 0; i < pageStates.length; i++) {
    const top = pageStates[i].pageDiv.offsetTop;
    if (top - bias <= viewerTop) best = i + 1;
    else break;
  }
  if (best !== currentPage) {
    currentPage = best;
    updatePageInfo();
  }
});

function updatePageInfo() {
  if (!pdfDoc) return;
  document.getElementById("page-info").innerText =
    `Page ${currentPage} / ${pdfDoc.numPages}`;
}

async function buildAllPages() {
  // Tear down any prior observer / DOM.
  if (pageObserver) { pageObserver.disconnect(); pageObserver = null; }
  viewer.innerHTML = "";
  pageStates = [];

  // Create a placeholder pageDiv sized to the page's viewport for every
  // page up front, so the scroll bar reflects total document height even
  // before pages are rendered.
  for (let i = 1; i <= pdfDoc.numPages; i++) {
    const page = await pdfDoc.getPage(i);
    const viewport = page.getViewport({ scale });

    const pageDiv = document.createElement("div");
    pageDiv.className = "page";
    pageDiv.dataset.pageNumber = String(i);
    pageDiv.style.width = viewport.width + "px";
    pageDiv.style.height = viewport.height + "px";
    viewer.appendChild(pageDiv);

    pageStates.push({
      pageDiv,
      page,
      viewport,
      canvas: null,
      textLayerDiv: null,
      linkLayerDiv: null,
      rendered: false,
      rendering: false,
    });
  }

  // Lazy-render pages as they enter the viewport (plus a buffer).
  pageObserver = new IntersectionObserver(entries => {
    for (const entry of entries) {
      if (!entry.isIntersecting) continue;
      const num = Number(entry.target.dataset.pageNumber);
      renderPageIfNeeded(num);
    }
  }, { root: viewer, rootMargin: "200px 0px" });

  for (const state of pageStates) pageObserver.observe(state.pageDiv);

  currentPage = 1;
  updatePageInfo();
}

async function renderPageIfNeeded(num) {
  const state = pageStates[num - 1];
  if (!state || state.rendered || state.rendering) return;
  state.rendering = true;

  const { page, viewport, pageDiv } = state;

  const canvas = document.createElement("canvas");
  const context = canvas.getContext("2d");
  canvas.height = viewport.height;
  canvas.width = viewport.width;

  const textLayerDiv = document.createElement("div");
  textLayerDiv.className = "textLayer";
  textLayerDiv.style.height = viewport.height + "px";
  textLayerDiv.style.width = viewport.width + "px";

  const linkLayerDiv = document.createElement("div");
  linkLayerDiv.className = "linkLayer";
  linkLayerDiv.style.height = viewport.height + "px";
  linkLayerDiv.style.width = viewport.width + "px";

  pageDiv.appendChild(canvas);
  pageDiv.appendChild(textLayerDiv);
  pageDiv.appendChild(linkLayerDiv);

  state.canvas = canvas;
  state.textLayerDiv = textLayerDiv;
  state.linkLayerDiv = linkLayerDiv;

  await page.render({ canvasContext: context, viewport }).promise;

  const textContent = await page.getTextContent();
  await pdfjsLib.renderTextLayer({
    textContent,
    container: textLayerDiv,
    viewport,
    textDivs: []
  }).promise;

  if (searchTerm) highlightInTextLayer(textLayerDiv, searchTerm);

  // Build clickable link rectangles from the page's annotations.
  try {
    const annotations = await page.getAnnotations();
    buildLinkLayer(linkLayerDiv, annotations, viewport);
  } catch (err) {
    console.warn("Link layer build failed:", err);
  }

  state.rendered = true;
  state.rendering = false;
}

function buildLinkLayer(container, annotations, viewport) {
  for (const ann of annotations) {
    if (ann.subtype !== "Link") continue;

    // Convert annotation rect (PDF user space) to viewport pixel coords.
    const [x1, y1, x2, y2] = pdfjsLib.Util.normalizeRect(
      viewport.convertToViewportRectangle(ann.rect)
    );

    const a = document.createElement("a");
    a.style.left = x1 + "px";
    a.style.top = y1 + "px";
    a.style.width = (x2 - x1) + "px";
    a.style.height = (y2 - y1) + "px";

    if (ann.url) {
      // External URL.
      a.href = ann.url;
      a.target = "_blank";
      a.rel = "noopener noreferrer nofollow";
      a.title = ann.url;
    } else if (ann.dest != null) {
      // Internal jump to another page in the same document.
      a.href = "#";
      a.title = "Go to page in document";
      a.addEventListener("click", async (e) => {
        e.preventDefault();
        const pageNumber = await resolveDestinationToPage(ann.dest);
        if (pageNumber) goToPage(pageNumber);
      });
    } else if (ann.action) {
      // Named actions like "NextPage", "PrevPage", "FirstPage", "LastPage".
      a.href = "#";
      a.title = ann.action;
      a.addEventListener("click", (e) => {
        e.preventDefault();
        switch (ann.action) {
          case "NextPage":  goToPage(currentPage + 1); break;
          case "PrevPage":  goToPage(currentPage - 1); break;
          case "FirstPage": goToPage(1); break;
          case "LastPage":  goToPage(pdfDoc.numPages); break;
        }
      });
    } else {
      // Nothing actionable (e.g. file attachment) — skip.
      continue;
    }

    container.appendChild(a);
  }
}

function highlightInTextLayer(textLayerDiv, term) {
  const lower = term.toLowerCase();
  const spans = textLayerDiv.querySelectorAll("span");
  spans.forEach(span => {
    if (span.children.length > 0) return;
    const text = span.textContent;
    const idx = text.toLowerCase().indexOf(lower);
    if (idx === -1) return;
    const before = document.createTextNode(text.slice(0, idx));
    const match = document.createElement("span");
    match.className = "highlight";
    match.textContent = text.slice(idx, idx + term.length);
    const after = document.createTextNode(text.slice(idx + term.length));
    span.textContent = "";
    span.append(before, match, after);
  });
}

function goToPage(num) {
  if (!pdfDoc) return;
  if (num < 1) num = 1;
  if (num > pdfDoc.numPages) num = pdfDoc.numPages;
  currentPage = num;
  const state = pageStates[num - 1];
  if (state) {
    // Scroll the target page to the top of the viewer.
    viewer.scrollTo({ top: state.pageDiv.offsetTop - 10, behavior: "smooth" });
  }
  updatePageInfo();
}

function prevPage() {
  if (!pdfDoc) return;
  goToPage(currentPage - 1);
}

function nextPage() {
  if (!pdfDoc) return;
  goToPage(currentPage + 1);
}

function zoomIn() {
  if (!pdfDoc) return;
  scale += 0.25;
  rebuildAtCurrentPage();
}

function zoomOut() {
  if (!pdfDoc) return;
  scale -= 0.25;
  if (scale < 0.5) scale = 0.5;
  rebuildAtCurrentPage();
}

async function rebuildAtCurrentPage() {
  const target = currentPage;
  await buildAllPages();
  goToPage(target);
}

async function searchText() {
  if (!pdfDoc) { alert("Open a PDF first."); return; }

  const term = document.getElementById("search-box").value.trim();
  if (!term) return;

  // If the term changed, restart from page 1 and re-highlight already-rendered
  // pages. Otherwise continue searching after the current page (Find Next).
  const termChanged = term.toLowerCase() !== searchTerm.toLowerCase();
  if (termChanged) {
    searchTerm = term;
    searchStartPage = 1;
    // Re-highlight any pages that were already rendered with the old term
    // by clearing and re-rendering their text layers.
    for (const state of pageStates) {
      if (state.rendered && state.textLayerDiv) {
        state.textLayerDiv.remove();
        state.textLayerDiv = null;
        state.canvas && state.canvas.remove();
        state.canvas = null;
        state.linkLayerDiv && state.linkLayerDiv.remove();
        state.linkLayerDiv = null;
        state.rendered = false;
      }
    }
  } else {
    searchStartPage = currentPage + 1;
    if (searchStartPage > pdfDoc.numPages) searchStartPage = 1;
  }

  const lower = term.toLowerCase();
  const total = pdfDoc.numPages;

  for (let offset = 0; offset < total; offset++) {
    const i = ((searchStartPage - 1 + offset) % total) + 1;
    const page = await pdfDoc.getPage(i);
    const textContent = await page.getTextContent();
    const fullText = textContent.items.map(item => item.str).join(' ').toLowerCase();

    if (fullText.includes(lower)) {
      goToPage(i);
      // Ensure the matched page renders (and gets highlighted) even if the
      // IntersectionObserver hasn't fired yet after the programmatic scroll.
      await renderPageIfNeeded(i);
      return;
    }
  }

  alert("Not found");
}
</script>

</body>
</html>
